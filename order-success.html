<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Confirmed — Digital Dreams Inc.</title>
<link rel="stylesheet" href="assets/css/app.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
<div class="aurora"></div>
<div style="min-height:100vh;display:grid;place-items:center;padding:24px;">
  <div class="glass" style="padding:48px;text-align:center;max-width:520px;">
    <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#4ade80);display:grid;place-items:center;margin:0 auto 24px;font-size:40px;">✓</div>
    <h1 style="margin:0 0 12px;font-size:36px;"><span class="gradient-text">Order Confirmed!</span></h1>
    <p class="text-muted" style="font-size:17px;">Thanks for your order. Our team will begin work within 24 hours.</p>
    <div id="orderBox" style="margin:24px 0;padding:20px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);text-align:left;"><p class="text-muted">Loading order…</p></div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
      <a href="index.html" class="btn btn-ghost">Home</a>
    </div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script>
const id = new URLSearchParams(location.search).get('orderId');
if (id) {
  api('orders/get&id=' + id).then(({ order, invoice }) => {
    $('#orderBox').innerHTML = `
      <div style="display:flex;justify-content:space-between;padding:6px 0;"><span class="text-muted">Order Number</span><b>${order.orderNumber}</b></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;"><span class="text-muted">Package</span><b>${order.pricing?.package?.name || '—'}</b></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;"><span class="text-muted">Total Paid</span><b class="gradient-text">$${fmt(order.pricing?.grandTotal || 0)}</b></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;"><span class="text-muted">Status</span><span class="pill pill-${order.status}">${order.status}</span></div>
      ${invoice ? `<div style="margin-top:12px;text-align:center;"><a class="btn btn-sm btn-ghost" href="invoice.html?id=${invoice.id}">View Invoice</a></div>` : ''}
    `;
  }).catch(e => { $('#orderBox').innerHTML = `<p style="color:#f87171;">${e.message}</p>`; });
}
</script>
</body>
</html>
